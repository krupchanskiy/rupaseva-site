  <script>
        function playVideo(video) {
            if (video.paused) {
                video.play();
            }
        }
        document.querySelectorAll('.video-element').forEach(element => {
            const video = element.querySelector('video');
            element.addEventListener('mouseover', () => playVideo(video));
            element.addEventListener('touchstart', () => playVideo(video));
                        element.addEventListener('mouseout', () => {
                if (!video.paused) {
                    video.pause();
                }
            });
            element.addEventListener('touchend', () => {
                if (!video.paused) {
                    video.pause();
                }
            });
        });
    </script>
  <script>
  /* nav*/
document.addEventListener("DOMContentLoaded", () => {
  const header = document.getElementById("header");
  const menuButton = document.getElementById("header-button");
  if (!menuButton) return;
  const headerNav = document.getElementById("header-nav");
  const langSwitcher = document.getElementById("lang-switcher");
  let clickCount = 0;
  document.addEventListener("keydown", function (event) {
    if (event.key === "Escape" || event.key === "Esc") {
      if (header.classList.contains("opened")) {
        closeMenu();
      }
    }
  });
  menuButton.addEventListener("click", function () {
    clickCount++;
    if (clickCount % 2 === 1) {
      openMenu();
    } else {
      closeMenu();
    }
  });
  function openMenu() {
    menuButton.classList.add("open");
    headerNav.style.display = "flex";
    langSwitcher.style.display = "flex";
    document.body.style.overflow = "hidden";
    setTimeout(function () {
      header.classList.add("opened");
    }, 10);
    menuButton.setAttribute("aria-expanded", "true");
  }
  function closeMenu() {
    menuButton.classList.remove("open");
    header.classList.remove("opened");
    document.body.style.overflow = "";
    setTimeout(function () {
      headerNav.style.display = "none";
      langSwitcher.style.display = "none";
    }, 600);
    menuButton.setAttribute("aria-expanded", "false");
  }
  let lastScrollY = 0;
  const vh = window.innerHeight * 0.24;
  const scrollThreshold = 20;
  window.addEventListener("scroll", () => {
    const currentScrollY = window.scrollY;
    if (currentScrollY < window.innerHeight * 0.05) {
      header.classList.remove("scrolled", "hidden");
    } else if (currentScrollY < vh) {
      if (Math.abs(currentScrollY - lastScrollY) > scrollThreshold) {
        if (currentScrollY > lastScrollY) {
          header.classList.add("hidden");
        } else {
          header.classList.remove("hidden");
        }
        lastScrollY = currentScrollY;
      }
    } else {
      header.classList.add("scrolled");
      if (Math.abs(currentScrollY - lastScrollY) > scrollThreshold) {
        if (currentScrollY > lastScrollY) {
          header.classList.add("hidden");
        } else {
          header.classList.remove("hidden");
        }
        lastScrollY = currentScrollY;
      }
    }
  });
  const links = document.querySelectorAll("a");
  const currentUrl = window.location.pathname;
  links.forEach(function (link) {
    const href = link.getAttribute("href");
    if (href && href === currentUrl) {
      link.classList.add("inactive");
      link.setAttribute("aria-current", "page");
    }
  });
  const langSwitcherEn = document.getElementById("switch-to-en");
  const langSwitcherRu = document.getElementById("switch-to-ru");
  const currentPath = window.location.pathname;
  if (!langSwitcherEn || !langSwitcherRu) {
    return;
  }
  const isEnglish = currentPath.startsWith("/en");
  let newPath;
  if (isEnglish) {
    langSwitcherEn.classList.add("inactive");
    langSwitcherEn.setAttribute("aria-current", "page");
    newPath = currentPath.replace("/en", "");
    if (newPath === "") newPath = "/";
    langSwitcherRu.href = newPath;
  } else {
    langSwitcherRu.classList.add("inactive");
    langSwitcherRu.setAttribute("aria-current", "page");
    newPath = "/en" + currentPath;
    langSwitcherEn.href = newPath;
  }
});
</script>
